name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package
        run: |
          tar -czf killport-${{ github.ref_name }}-universal-macos.tar.gz \
            -C .build/apple/Products/Release killport

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: killport-*-universal-macos.tar.gz
          generate_release_notes: true
